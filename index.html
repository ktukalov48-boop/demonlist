<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тыква Демонлист</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        :root {
            --text-main: #ffffff;
            --accent-blue: #4da3ff;
            --accent-red: #ff4d4d;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #0a0b10; color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 50%, #1a1c2c 0%, #0a0b10 100%); }
        .blob { position: absolute; width: 600px; height: 600px; background: linear-gradient(135deg, #6366f1 0%, #db2777 100%); filter: blur(100px); border-radius: 50%; opacity: 0.15; animation: move 25s infinite alternate ease-in-out; }
        @keyframes move { from { transform: translate(-20%, -20%); } to { transform: translate(80%, 40%); } }

        header { backdrop-filter: blur(20px) saturate(180%); background-color: rgba(10, 11, 16, 0.7); height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 100; }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 800; text-transform: uppercase; font-size: 15px; }
        .logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, #f59e0b, #ef4444); display: flex; align-items: center; justify-content: center; }
        .user-controls { cursor: pointer; color: var(--accent-blue); font-weight: 600; }

        main { max-width: 850px; margin: 40px auto; padding: 0 20px; }
        .list-container { display: flex; flex-direction: column; gap: 16px; }
        
        /* Карточка уровня */
        .card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(30px); 
            border: 1px solid var(--glass-border); 
            border-radius: 22px; 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            gap: 24px; 
            transition: 0.3s ease; 
            cursor: pointer;
        }
        .card:hover { transform: scale(1.02); background: rgba(255, 255, 255, 0.08); }
        .card-image { width: 210px; height: 115px; border-radius: 14px; background-size: cover; background-position: center; background-color: #1a1c2c; }
        .card-title { font-size: 21px; font-weight: 700; color: #fff; }
        .rank { color: var(--accent-blue); margin-right: 8px; }

        /* Баннер уровня в меню */
        .level-banner {
            width: 100%;
            height: 200px;
            border-radius: 18px;
            background-size: cover;
            background-position: center;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            position: relative;
        }
        .level-banner::after {
            content: '';
            position: absolute;
            bottom: 0; width: 100%; height: 50%;
            background: linear-gradient(transparent, #111218);
        }

        /* Список игроков */
        .players-section { max-width: 850px; margin: 60px auto; padding: 0 20px; }
        .section-title { font-size: 24px; font-weight: 800; margin-bottom: 24px; color: var(--accent-blue); text-transform: uppercase; }
        .player-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); border-radius: 18px; padding: 16px 24px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }

        /* Модалки */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; z-index: 999; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box { background: #111218; border: 1px solid var(--glass-border); border-radius: 28px; padding: 30px; width: 100%; max-width: 550px; }

        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .info-label { color: rgba(255,255,255,0.5); font-size: 14px; }
        .info-value { font-weight: 600; color: #fff; }

        /* Редактор куба */
        .pixel-grid { display: grid; grid-template-columns: repeat(8, 1fr); width: 128px; height: 128px; background: #000; border: 1px solid rgba(255,255,255,0.2); margin: 0 auto 15px; }
        .pixel { width: 16px; height: 16px; border: 0.1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; margin: 0 5px; }

        .btn-main { background: var(--accent-blue); border: none; padding: 14px; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; width: 100%; margin-top: 15px; }
        .glass-input { background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); padding: 14px; border-radius: 12px; color: white; width: 100%; margin-bottom: 15px; outline: none; }
    </style>
</head>
<body>
    <div class="animated-bg"><div class="blob"></div></div>
    
    <header>
        <div class="logo"><div class="logo-icon">ТД</div> Тыква Демонлист</div>
        <div id="user-btn" class="user-controls" onclick="handleUserClick()">Войти / Регистрация</div>
    </header>

    <main>
        <div class="list-container" id="list"></div>
    </main>

    <section class="players-section">
        <h2 class="section-title">Топ игроков</h2>
        <div id="players-list"></div>
    </section>

    <div class="modal-overlay" id="level-modal">
        <div class="modal-box">
            <div id="level-banner" class="level-banner"></div>
            <h2 id="m-level-name" style="font-size: 28px; margin-bottom: 20px;">Название</h2>
            
            <div class="info-row"><span class="info-label">Кто создал:</span> <span class="info-value" id="m-creator">-</span></div>
            <div class="info-row"><span class="info-label">Когда создан:</span> <span class="info-value" id="m-created-date">-</span></div>
            <div class="info-row"><span class="info-label">Кто прошел:</span> <span class="info-value" id="m-victors">-</span></div>
            <div class="info-row"><span class="info-label">Когда пройден (First Victor):</span> <span class="info-value" id="m-win-date">-</span></div>
            
            <button onclick="closeModals()" class="btn-main" style="background: #222;">Закрыть</button>
        </div>
    </div>

    <div class="modal-overlay" id="auth-modal">
        <div class="modal-box" style="max-width: 380px;">
            <h2>Вход</h2><br>
            <input type="text" id="username" class="glass-input" placeholder="Никнейм">
            <button class="btn-main" onclick="submitAuth()">Войти</button>
        </div>
    </div>

    <div class="modal-overlay" id="profile-modal">
        <div class="modal-box">
            <h2 style="text-align: center;">ПРОФИЛЬ</h2>
            <div style="display: flex; gap: 20px; margin-top: 20px;">
                <div style="flex: 1; text-align: center;">
                    <div class="pixel-grid" id="cube-editor"></div>
                    <div style="display: flex; justify-content: center;">
                        <div class="color-dot" style="background: #00aeef;" onclick="currentColor='#00aeef'"></div>
                        <div class="color-dot" style="background: #fff;" onclick="currentColor='#fff'"></div>
                        <div class="color-dot" style="background: #ff4d4d;" onclick="currentColor='#ff4d4d'"></div>
                        <div class="color-dot" style="background: #000;" onclick="currentColor='#000'"></div>
                    </div>
                </div>
                <div style="flex: 1.2;">
                    <p style="font-size: 12px; color: #666;">СТАТИСТИКА (клик для изм.)</p>
                    <div onclick="openInputModal('completed', 'Пройдено')" style="cursor:pointer; margin: 10px 0;">
                        🏆 Пройдено: <span id="stat-completed" style="color: var(--accent-red);">0</span>
                    </div>
                    <div onclick="openInputModal('hardest', 'Hardest')" style="cursor:pointer; margin: 10px 0;">
                        💀 Hardest: <span id="stat-hardest" style="color: var(--accent-red);">None</span>
                    </div>
                </div>
            </div>
            <button class="btn-main" onclick="logout()" style="background: #ef444422; border: 1px solid #ef4444; color: #ef4444; margin-top: 20px;">Выйти</button>
            <button onclick="closeModals()" class="btn-main" style="background: #222;">Закрыть</button>
        </div>
    </div>

    <div class="modal-overlay" id="input-modal">
        <div class="modal-box" style="max-width: 350px; border: 1px solid var(--accent-blue);">
            <h3 id="input-modal-title">Изменить</h3><br>
            <input type="text" id="custom-input-field" class="glass-input">
            <button class="btn-main" onclick="saveCustomValue()">ОК</button>
        </div>
    </div>

    <script>
        let currentUser = localStorage.getItem('currentUser');
        let currentColor = '#00aeef';
        let currentEditingKey = '';

        // ДАННЫЕ УРОВНЕЙ (Добавлены новые поля)
        const levels = [
            {
                n: "Electro pisya colonka", c: "GMDCrabik", 
                img: "https://i.ytimg.com/vi/qYv_Y6W9J_8/maxresdefault.jpg",
                createdDate: "12.02.2026", victors: "GMDCrabik, Zoink", winDate: "14.02.2026"
            },
            {
                n: "Clubstep", c: "RobTop", 
                img: "https://images.steamusercontent.com/ugc/960865239929140383/C9340911DF4CFB37481CC0178650128FF75C7D4D/",
                createdDate: "??.??.2014", victors: "Everyone", winDate: "Давно"
            },
            {
                n: "Thinking Space II", c: "Creator", 
                img: "https://i.ytimg.com/vi/8S-n0rS8Pks/maxresdefault.jpg",
                createdDate: "01.01.2026", victors: "Никто", winDate: "-"
            }
        ];

        const players = [
            { name: "Zoink", completed: ["Clubstep"], points: "100.00" },
            { name: "GMDCrabik", completed: ["Electro pisya colonka"], points: "85.50" }
        ];

        window.onload = () => {
            renderLevels();
            renderPlayers();
            if (currentUser) document.getElementById('user-btn').innerText = "👤 " + currentUser;
        };

        function renderLevels() {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = '';
            levels.forEach((lvl, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openLevelInfo(lvl);
                card.innerHTML = `
                    <div class="card-image" style="background-image: url('${lvl.img}')"></div>
                    <div>
                        <div class="card-title"><span class="rank">#${i+1}</span> ${lvl.n}</div>
                        <div style="color: rgba(255,255,255,0.4); font-size: 14px;">${lvl.c}</div>
                    </div>`;
                listDiv.appendChild(card);
            });
        }

        function openLevelInfo(lvl) {
            document.getElementById('m-level-name').innerText = lvl.n;
            document.getElementById('m-creator').innerText = lvl.c;
            document.getElementById('m-created-date').innerText = lvl.createdDate;
            document.getElementById('m-victors').innerText = lvl.victors;
            document.getElementById('m-win-date').innerText = lvl.winDate;
            document.getElementById('level-banner').style.backgroundImage = `url('${lvl.img}')`;
            document.getElementById('level-modal').classList.add('active');
        }

        function renderPlayers() {
            const pDiv = document.getElementById('players-list');
            players.forEach((p, i) => {
                pDiv.innerHTML += `<div class="player-card">
                    <div><b>#${i+1} ${p.name}</b><div style="font-size:12px; opacity:0.5">Пройдено: ${p.completed}</div></div>
                    <div style="color:var(--accent-blue); font-weight:800">${p.points} pts</div>
                </div>`;
            });
        }

        // Функции профиля (копируем из прошлого кода)
        function handleUserClick() { if (currentUser) openProfile(); else document.getElementById('auth-modal').classList.add('active'); }
        function openProfile() { document.getElementById('profile-modal').classList.add('active'); initCube(); loadStats(); }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }
        function submitAuth() { 
            let u = document.getElementById('username').value.trim();
            if(!u) return;
            localStorage.setItem('currentUser', u);
            let db = JSON.parse(localStorage.getItem('usersDB')) || {};
            if(!db[u]) db[u] = { stats: {completed: "0", hardest: "None"}, cube: Array(64).fill('#000') };
            localStorage.setItem('usersDB', JSON.stringify(db));
            location.reload();
        }
        function initCube() {
            const g = document.getElementById('cube-editor'); g.innerHTML = '';
            let db = JSON.parse(localStorage.getItem('usersDB'));
            db[currentUser].cube.forEach((col, i) => {
                let p = document.createElement('div'); p.className = 'pixel'; p.style.background = col;
                p.onclick = () => { p.style.background = currentColor; saveCube(); };
                g.appendChild(p);
            });
        }
        function saveCube() {
            let colors = Array.from(document.querySelectorAll('.pixel')).map(p => p.style.backgroundColor);
            let db = JSON.parse(localStorage.getItem('usersDB'));
            db[currentUser].cube = colors;
            localStorage.setItem('usersDB', JSON.stringify(db));
        }
        function loadStats() {
            let db = JSON.parse(localStorage.getItem('usersDB'));
            document.getElementById('stat-completed').innerText = db[currentUser].stats.completed;
            document.getElementById('stat-hardest').innerText = db[currentUser].stats.hardest;
        }
        function openInputModal(key, title) { currentEditingKey = key; document.getElementById('input-modal-title').innerText = title; document.getElementById('input-modal').classList.add('active'); }
        function saveCustomValue() {
            let v = document.getElementById('custom-input-field').value;
            let db = JSON.parse(localStorage.getItem('usersDB'));
            db[currentUser].stats[currentEditingKey] = v;
            localStorage.setItem('usersDB', JSON.stringify(db));
            loadStats(); closeModals();
        }
        function logout() { localStorage.removeItem('currentUser'); location.reload(); }
    </script>
</body>
</html>
