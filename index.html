<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тыква Демонлист</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root {
            --text-main: #ffffff;
            --accent-blue: #4da3ff;
            --accent-red: #ff4d4d;
            --accent-green: #4caf50;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #0a0b10; color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 50%, #1a1c2c 0%, #0a0b10 100%); }
        .blob { position: absolute; width: 600px; height: 600px; background: linear-gradient(135deg, #6366f1 0%, #db2777 100%); filter: blur(100px); border-radius: 50%; opacity: 0.1; animation: move 25s infinite alternate ease-in-out; }

        header { backdrop-filter: blur(20px); background: rgba(10, 11, 16, 0.7); height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 100; }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 800; text-transform: uppercase; font-size: 14px; }
        .logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, #f59e0b, #ef4444); display: flex; align-items: center; justify-content: center; }
        
        /* ВЫПАДАЮЩЕЕ МЕНЮ С АНИМАЦИЕЙ */
        .nav-menu { position: relative; display: inline-block; margin-left: 20px; }
        .nav-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600; transition: 0.2s; user-select: none; }
        
        .dropdown-content { 
            display: none; 
            position: absolute; 
            top: calc(100% + 8px); 
            left: 0; 
            background: #111218; 
            border: 1px solid var(--glass-border); 
            border-radius: 12px; 
            min-width: 160px; 
            z-index: 101; 
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transform-origin: top left;
        }

        .dropdown-content.show { 
            display: block; 
            animation: dropdown-anim 0.25s ease-out forwards; 
        }

        @keyframes dropdown-anim {
            from { opacity: 0; transform: translateY(-10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .dropdown-content a { color: white; padding: 12px 16px; text-decoration: none; display: block; font-size: 14px; transition: 0.2s; cursor: pointer; }
        .dropdown-content a:hover { background: var(--accent-blue); }

        /* КАРТОЧКИ С АНИМАЦИЕЙ */
        main { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .card { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 20px; margin-bottom: 15px; transition: 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-4px); background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2); }
        .card-img { width: 180px; height: 100px; border-radius: 12px; background-size: cover; background-position: center; }

        .player-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 15px; padding: 15px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; transition: 0.3s; }
        .player-card:hover { background: rgba(255, 255, 255, 0.08); }
        
        .mini-cube { display: grid; grid-template-columns: repeat(8, 1fr); width: 40px; height: 40px; background: #000; border-radius: 4px; overflow: hidden; }
        .p-pixel { width: 5px; height: 5px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: #111218; border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px; width: 90%; max-width: 450px; text-align: center; }

        .level-banner { width: 100%; height: 180px; border-radius: 18px; background-size: cover; background-position: center; margin-bottom: 20px; border: 1px solid var(--glass-border); }
        .level-info-row { display: flex; justify-content: space-between; margin: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }

        .auth-tabs { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); }
        .auth-tab { flex: 1; padding: 10px; cursor: pointer; opacity: 0.5; font-weight: 700; }
        .auth-tab.active { opacity: 1; color: var(--accent-blue); border-bottom: 2px solid var(--accent-blue); }

        .glass-input { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 12px; border-radius: 10px; color: white; width: 100%; margin-bottom: 12px; outline: none; }
        .btn-main { border: none; padding: 12px; border-radius: 10px; color: white; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-blue { background: var(--accent-blue); }
        .btn-green { background: var(--accent-green); }

        .btn-logout { background: none; border: 1px solid #ff4d4d33; color: #ff4d4d; padding: 12px; border-radius: 12px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: 600; transition: 0.2s; }
        .btn-logout:hover { background: #ff4d4d11; }

        .palette { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-dot.active { border-color: white; transform: scale(1.1); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; text-align: left; }
        .stat-card { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; border: 1px solid var(--glass-border); cursor: pointer; }
        .stat-label { font-size: 10px; opacity: 0.5; text-transform: uppercase; }
        .stat-value { font-size: 14px; font-weight: 800; color: var(--accent-red); display: block; }

        .pixel-grid { display: grid; grid-template-columns: repeat(8, 1fr); width: 160px; height: 160px; margin: 0 auto 20px; border: 1px solid #222; }
        .pixel { width: 20px; height: 20px; border: 0.1px solid rgba(255,255,255,0.05); cursor: pointer; }
    </style>
</head>
<body>
    <div class="animated-bg"><div class="blob"></div></div>
    <header>
        <div style="display: flex; align-items: center;">
            <div class="logo"><div class="logo-icon">ТД</div> Тыква Демонлист</div>
            <div class="nav-menu">
                <div class="nav-btn" onclick="toggleDropdown(event)">Lists ▾</div>
                <div class="dropdown-content" id="myDropdown">
                    <a onclick="showSection('classic')">Classic list</a>
                    <a onclick="showSection('players')">Player list</a>
                </div>
            </div>
        </div>
        <div id="user-display" class="user-btn" onclick="openAuth()">Войти / Регистрация</div>
    </header>

    <main id="main-content"></main>

    <div class="modal-overlay" id="level-modal">
        <div class="modal-box">
            <div id="m-banner" class="level-banner"></div>
            <h2 id="m-name"></h2>
            <div id="m-info">
                <div class="level-info-row"><span>Автор:</span> <span id="m-creator"></span></div>
                <div class="level-info-row"><span>Сложность:</span> <span style="color:var(--accent-red)">Extreme Demon</span></div>
            </div>
            <button onclick="closeModals()" class="btn-main btn-blue">Закрыть</button>
        </div>
    </div>

    <div class="modal-overlay" id="auth-modal"><div class="modal-box"><div class="auth-tabs"><div class="auth-tab active" id="tab-login" onclick="setTab('login')">Вход</div><div class="auth-tab" id="tab-reg" onclick="setTab('reg')">Регистрация</div></div><input type="text" id="auth-user" class="glass-input" placeholder="Никнейм"><input type="password" id="auth-pass" class="glass-input" placeholder="Пароль"><button id="btn-login" class="btn-main btn-blue" onclick="handleLogin()">Войти</button><button id="btn-reg" class="btn-main btn-green" onclick="handleReg()" style="display:none">Создать аккаунт</button></div></div>
    
    <div class="modal-overlay" id="profile-modal">
        <div class="modal-box">
            <h2>ПРОФИЛЬ</h2>
            <div class="pixel-grid" id="cube-canvas"></div>
            <div class="palette">
                <div class="color-dot active" style="background:#00aeef" onclick="setBrush('#00aeef', this)"></div>
                <div class="color-dot" style="background:#ffffff" onclick="setBrush('#ffffff', this)"></div>
                <div class="color-dot" style="background:#ff4d4d" onclick="setBrush('#ff4d4d', this)"></div>
                <div class="color-dot" style="background:#000000" onclick="setBrush('#000000', this)"></div>
            </div>
            <div class="stats-grid">
                <div class="stat-card" onclick="editStat('completed')"><span class="stat-label">🏆 Пройдено</span><span class="stat-value" id="st-completed">0</span></div>
                <div class="stat-card" onclick="editStat('hardest')"><span class="stat-label">💀 Hardest</span><span class="stat-value" id="st-hardest">None</span></div>
                <div class="stat-card" onclick="editStat('created')"><span class="stat-label">🛠️ Создано</span><span class="stat-value" id="st-created">0</span></div>
                <div class="stat-card" onclick="editStat('inList')"><span class="stat-label">📜 В листе</span><span class="stat-value" id="st-inList">0</span></div>
            </div>
            <button onclick="logout()" class="btn-logout">Выйти</button>
            <button onclick="closeModals()" class="btn-main btn-blue">Закрыть</button>
        </div>
    </div>

    <div class="modal-overlay" id="edit-modal"><div class="modal-box"><h3>Изменить</h3><input type="text" id="edit-input" class="glass-input"><button onclick="saveStat()" class="btn-main btn-blue">Сохранить</button></div></div>

    <script>
        let currentUser = localStorage.getItem('currentUser');
        let brush = '#00aeef';
        let currentEditKey = '';
        const levels = [
            { n: "Electro pisya colonka", c: "GMDCrabik", img: "https://i.ytimg.com/vi/qYv_Y6W9J_8/maxresdefault.jpg" },
            { n: "Clubstep", c: "RobTop", img: "https://images.steamusercontent.com/ugc/960865239929140383/C9340911DF4CFB37481CC0178650128FF75C7D4D/" }
        ];

        window.onload = () => {
            showSection('classic');
            if(currentUser) document.getElementById('user-display').innerText = "👤 " + currentUser;
        };

        function setBrush(c, el) { 
            brush = c; 
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function toggleDropdown(e) { 
            e.stopPropagation(); 
            document.getElementById("myDropdown").classList.toggle("show"); 
        }

        window.onclick = () => { document.getElementById("myDropdown").classList.remove("show"); };

        function showSection(type) {
            const cont = document.getElementById('main-content');
            cont.innerHTML = '';
            let db = JSON.parse(localStorage.getItem('usersDB')) || {};

            if(type === 'classic') {
                levels.forEach((l, i) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openLevelInfo(i); // ВЕРНУЛ КЛИК
                    card.innerHTML = `
                        <div class="card-img" style="background-image:url('${l.img}')"></div>
                        <div><div style="font-weight:800; font-size:18px"><span style="color:var(--accent-blue)">#${i+1}</span> ${l.n}</div><div style="opacity:0.5; font-size:12px">by ${l.c}</div></div>
                    `;
                    cont.appendChild(card);
                });
            } else {
                let names = Object.keys(db);
                names.forEach(u => {
                    let d = db[u];
                    let cubeHTML = `<div class="mini-cube">` + d.cube.map(c => `<div class="p-pixel" style="background:${c}"></div>`).join('') + `</div>`;
                    cont.innerHTML += `<div class="player-card">
                        <div style="display:flex; align-items:center; gap:15px;">${cubeHTML}<div><div style="font-weight:800;">${u}</div><div style="font-size:12px; color:var(--accent-blue)">🏆 ${d.stats.completed} demons</div></div></div>
                        <div style="text-align:right;"><span style="opacity:0.4; font-size:10px;">Hardest:</span><div style="color:var(--accent-red); font-weight:800;">${d.stats.hardest}</div></div>
                    </div>`;
                });
            }
            document.getElementById("myDropdown").classList.remove("show");
        }

        function openLevelInfo(i) {
            let l = levels[i];
            document.getElementById('m-name').innerText = l.n;
            document.getElementById('m-creator').innerText = l.c;
            document.getElementById('m-banner').style.backgroundImage = `url('${l.img}')`;
            document.getElementById('level-modal').classList.add('active');
        }

        function handleReg() {
            let u = document.getElementById('auth-user').value.trim();
            let p = document.getElementById('auth-pass').value.trim();
            if(!u || !p) return;
            let db = JSON.parse(localStorage.getItem('usersDB')) || {};
            if(db[u]) return alert("Этот ник уже занят!");
            db[u] = { pass: p, cube: Array(64).fill('#000000'), stats: {completed:'0', hardest:'None', created:'0', inList:'0'} };
            localStorage.setItem('usersDB', JSON.stringify(db));
            localStorage.setItem('currentUser', u);
            location.reload();
        }

        function handleLogin() {
            let u = document.getElementById('auth-user').value.trim();
            let p = document.getElementById('auth-pass').value.trim();
            let db = JSON.parse(localStorage.getItem('usersDB')) || {};
            if(db[u] && db[u].pass === p) { localStorage.setItem('currentUser', u); location.reload(); }
            else alert("Ошибка входа");
        }

        function openAuth() { if(currentUser) openProfile(); else document.getElementById('auth-modal').classList.add('active'); }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }
        
        function openProfile() {
            let db = JSON.parse(localStorage.getItem('usersDB'));
            let d = db[currentUser];
            document.getElementById('profile-modal').classList.add('active');
            ['completed','hardest','created','inList'].forEach(s => document.getElementById('st-'+s).innerText = d.stats[s]);
            const cv = document.getElementById('cube-canvas'); cv.innerHTML = '';
            d.cube.forEach((c, i) => {
                let p = document.createElement('div'); p.className = 'pixel'; p.style.background = c;
                p.onclick = () => { p.style.background = brush; saveCube(); }; cv.appendChild(p);
            });
        }

        function saveCube() {
            let db = JSON.parse(localStorage.getItem('usersDB'));
            db[currentUser].cube = Array.from(document.querySelectorAll('.pixel')).map(p => p.style.backgroundColor);
            localStorage.setItem('usersDB', JSON.stringify(db));
        }

        function editStat(k) { currentEditKey = k; document.getElementById('edit-modal').classList.add('active'); }
        function saveStat() {
            let v = document.getElementById('edit-input').value;
            let db = JSON.parse(localStorage.getItem('usersDB'));
            db[currentUser].stats[currentEditKey] = v;
            localStorage.setItem('usersDB', JSON.stringify(db));
            location.reload();
        }

        function setTab(m) {
            document.getElementById('tab-login').classList.toggle('active', m==='login');
            document.getElementById('tab-reg').classList.toggle('active', m==='reg');
            document.getElementById('btn-login').style.display = m==='login'?'block':'none';
            document.getElementById('btn-reg').style.display = m==='reg'?'block':'none';
        }

        function logout() { localStorage.removeItem('currentUser'); location.reload(); }
    </script>
</body>
</html>
